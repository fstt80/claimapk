<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USER CHECKER</title>

<style>

body{
  font-family:Calibri,Arial,sans-serif;
  background:radial-gradient(circle at top,#3b2a00,#120d02);
  padding:12px;
  color:#fff;
  display:flex;
  justify-content:center;
}

@keyframes goldPulse{

  0%{
    box-shadow:0 0 8px #ffd700,0 0 20px #ffae00;
    border-color:#ffd700;
  }

  50%{
    box-shadow:0 0 12px #fff3a1,0 0 28px #ffcc00;
    border-color:#fff3a1;
  }

  100%{
    box-shadow:0 0 8px #ffd700,0 0 20px #ffae00;
    border-color:#ffd700;
  }

}

.container{
  width:100%;
  max-width:580px;
}

.logo{
  text-align:center;
  margin-bottom:10px;
}

.logo img{
  width:420px;
  max-width:100%;
}

table{
  border-collapse:collapse;
  width:100%;
  background:rgba(20,15,0,0.94);
  border-radius:12px;
  border:3px solid #ffd700;
  animation:goldPulse 2s infinite;
  overflow:hidden;
}

td{
  border:1px solid rgba(255,255,255,0.12);
  padding:16px;
  font-size:21px;
}

td.label{
  width:180px;
  font-weight:bold;
  color:#ffd700;
}

.input-wrap{
  display:flex;
  gap:8px;
}

input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
  font-size:21px;
}

input:disabled{
  opacity:.6;
}

#okButton{
  display:none;
  background:#ffd700;
  color:black;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  font-size:16px;
}

#result{
  margin-top:18px;
  text-align:center;
  font-size:52px;
  font-weight:bold;
  display:none;
}

.gas{
  color:#00ff88;
}

.jangan{
  color:#ff3b3b;
}

.loading{
  color:#aaa;
}

.footer{
  margin-top:10px;
  text-align:center;
  color:#999;
  font-size:17px;
  line-height:1.7;
}

@media(max-width:600px){

  .logo img{
    width:300px;
  }

  td{
    font-size:16px;
    padding:12px;
  }

  td.label{
    width:120px;
  }

  input{
    font-size:16px;
  }

  #result{
    font-size:40px;
  }

}

</style>
</head>

<body>

<div class="container">

<div class="logo">
  <img src="https://imgstore.io/images/2026/02/01/logo-utama.gif">
</div>

<form id="form" autocomplete="off">

<table>

<tr>

<td class="label">
User ID
</td>

<td>

<div class="input-wrap">

<input
  id="userid"
  placeholder="MASUKKAN USER ID"
  autocomplete="off"
  autofocus>

<button
  type="button"
  id="okButton"
  onclick="resetInput()">
  OK
</button>

</div>

</td>

</tr>

</table>

<div id="result"></div>

</form>

<div class="footer">
  BUAT SENDIRI BOSS !!<br>
  JANGAN MAIN CURI 😎
</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxwsB67nLVGU2IqWax53O9jTjdpNzNpc4OZ2n_31-gwXhWEmGevxdSgIVO20ubwM6UQ/exec";

const input =
  document.getElementById("userid");

const form =
  document.getElementById("form");

const result =
  document.getElementById("result");

const okButton =
  document.getElementById("okButton");

// check user
async function checkUser(){

  const userId = input.value.trim();

  if(!userId) return;

  input.disabled = true;

  result.style.display = "block";
  result.className = "loading";
  result.innerHTML = "CHECKING...";

  try{

    const response = await fetch(
      API_URL +
      "?text=" +
      encodeURIComponent(userId)
    );

    const data = await response.json();

    if(data.result === "jangan"){

      result.className = "jangan";
      result.innerHTML = "❌ JANGAN";

    }else{

      result.className = "gas";
      result.innerHTML = "✅ GAS";

    }

    okButton.style.display = "block";

  }catch(err){

    result.className = "jangan";
    result.innerHTML = "ERROR";

  }

}

// reset
function resetInput(){

  input.disabled = false;

  input.value = "";

  result.innerHTML = "";

  result.style.display = "none";

  okButton.style.display = "none";

  input.focus();

}

// enter auto check
input.addEventListener("keydown",e=>{

  if(e.key==="Enter"){

    e.preventDefault();

    if(input.disabled) return;

    checkUser();

  }

});

// submit backup
form.addEventListener("submit",e=>{

  e.preventDefault();

  if(input.disabled) return;

  checkUser();

});

</script>

</body>
</html>
